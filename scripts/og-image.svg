<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
	<defs>
		<pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
			<circle cx="1" cy="1" r="1" fill="#1f1f1f" />
		</pattern>
		<linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
			<stop offset="0" stop-color="#0a0a0a" stop-opacity="0" />
			<stop offset="1" stop-color="#0a0a0a" stop-opacity="0.85" />
		</linearGradient>
		<linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
			<stop offset="0" stop-color="#00ff88" />
			<stop offset="1" stop-color="#00ff88" stop-opacity="0" />
		</linearGradient>
	</defs>

	<!-- background -->
	<rect width="1200" height="630" fill="#0a0a0a" />
	<rect width="1200" height="630" fill="url(#grid)" />
	<rect width="1200" height="630" fill="url(#fade)" />

	<!-- outer brutalist frame -->
	<rect x="40" y="40" width="1120" height="550" fill="none" stroke="#2a2a2a" stroke-width="1" />

	<!-- top bar: label + date -->
	<g font-family="'Space Mono', 'Menlo', monospace" font-size="14" fill="#8a8a8a" letter-spacing="2">
		<line x1="80" y1="90" x2="120" y2="90" stroke="#8a8a8a" stroke-width="1" />
		<text x="135" y="95" letter-spacing="3">PORTFOLIO / 2026</text>
		<text x="1120" y="95" text-anchor="end" letter-spacing="3">LUKASZRYCZKO.PL</text>
	</g>

	<!-- main heading -->
	<g font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="900" letter-spacing="-4">
		<text x="80" y="295" font-size="140" fill="#ffffff">ŁUKASZ</text>
		<text x="80" y="425" font-size="140" fill="none" stroke="#ffffff" stroke-width="2">RYCZKO</text>
	</g>

	<!-- accent line -->
	<rect x="80" y="455" width="320" height="3" fill="url(#accent)" />

	<!-- role -->
	<g font-family="'Space Mono', 'Menlo', monospace" fill="#cccccc">
		<text x="80" y="500" font-size="22" letter-spacing="1">Software Engineer</text>
	</g>

	<!-- tags row -->
	<g font-family="'Space Mono', 'Menlo', monospace" font-size="14" letter-spacing="2">
		<g>
			<rect x="80" y="530" width="120" height="36" fill="none" stroke="#00ff88" />
			<text x="140" y="554" fill="#00ff88" text-anchor="middle">BACKEND</text>
		</g>
		<g>
			<rect x="210" y="530" width="120" height="36" fill="none" stroke="#a855f7" />
			<text x="270" y="554" fill="#a855f7" text-anchor="middle">AI / LLM</text>
		</g>
		<g>
			<rect x="340" y="530" width="130" height="36" fill="none" stroke="#e8a317" />
			<text x="405" y="554" fill="#e8a317" text-anchor="middle">EMBEDDED</text>
		</g>
		<g>
			<rect x="480" y="530" width="120" height="36" fill="none" stroke="#3b82f6" />
			<text x="540" y="554" fill="#3b82f6" text-anchor="middle">LARAVEL</text>
		</g>
	</g>

	<!-- right side: ŁR monogram -->
	<g transform="translate(950, 270)">
		<rect x="-90" y="-110" width="180" height="220" fill="none" stroke="#ffffff" stroke-width="2" />
		<text x="0" y="40" font-family="'Inter', sans-serif" font-weight="900" font-size="180" fill="#ffffff" text-anchor="middle" letter-spacing="-8">ŁR</text>
	</g>

	<!-- bottom meta -->
	<g font-family="'Space Mono', monospace" font-size="11" fill="#5a5a5a" letter-spacing="2">
		<text x="1115" y="555" text-anchor="end">// ENGINEERING</text>
	</g>
</svg>
